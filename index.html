<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Health-Twin — AI Health Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090f; --bg2:#0c0f1c; --bg3:#111525;
  --card:#13172a; --card2:#181d32; --card3:#1d2238;
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.1); --border3:rgba(255,255,255,.16);
  --text:#dde5ff; --text2:#7585b0; --text3:#3b4570;
  --accent:#5b8df6; --accent2:#7b6cf6; --accent-glow:rgba(91,141,246,.2);
  --green:#10d98a; --green-d:rgba(16,217,138,.15);
  --red:#f55a51;   --red-d:rgba(245,90,81,.15);
  --amber:#f7b731; --amber-d:rgba(247,183,49,.15);
  --teal:#1cd6c4;  --teal-d:rgba(28,214,196,.15);
  --pink:#e879a8;  --pink-d:rgba(232,121,168,.15);
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:12px; --r-sm:8px; --r-lg:18px; --r-xl:24px;
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --glow-accent:0 0 40px rgba(91,141,246,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;overflow:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ══════════════════════════════════════
   LANDING / ROLE SELECTION
══════════════════════════════════════ */
#landing{position:fixed;inset:0;z-index:5000;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 120% 90% at 50% -10%,#0b1238 0%,#07090f 60%)}
.landing-inner{width:100%;max-width:880px;padding:20px;text-align:center}
.vitacore-logo{margin-bottom:48px}
.logo-icon{width:72px;height:72px;border-radius:22px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:34px;
  margin:0 auto 16px;box-shadow:0 0 60px rgba(91,141,246,.4),var(--shadow)}
.logo-icon svg{width:40px;height:40px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-name{font-size:38px;font-weight:800;letter-spacing:-1.5px;
  background:linear-gradient(135deg,#fff 30%,#7585b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:12px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-top:4px;font-weight:500}
.landing-q{font-size:13px;color:var(--text2);margin-bottom:30px;font-weight:500;letter-spacing:.02em}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:560px;margin:0 auto 32px}
.role-card{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--r-xl);
  padding:32px 28px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;text-align:left}
.role-card::before{content:'';position:absolute;inset:0;opacity:0;transition:.25s;border-radius:inherit}
.role-card.patient::before{background:radial-gradient(ellipse at top left,rgba(91,141,246,.12),transparent 60%)}
.role-card.doctor::before{background:radial-gradient(ellipse at top left,rgba(16,217,138,.1),transparent 60%)}
.role-card:hover{border-color:var(--border3);transform:translateY(-3px);box-shadow:var(--shadow)}
.role-card:hover::before{opacity:1}
.role-card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.role-card.patient .role-card-icon{background:var(--accent-glow);border:1px solid rgba(91,141,246,.25)}
.role-card.doctor .role-card-icon{background:var(--green-d);border:1px solid rgba(16,217,138,.25)}
.role-card h3{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px}
.role-card p{font-size:12px;color:var(--text2);line-height:1.5}
.role-card .role-arrow{position:absolute;top:20px;right:20px;width:28px;height:28px;border-radius:8px;
  background:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:.4;transition:.2s}
.role-card:hover .role-arrow{opacity:1;background:var(--border2)}
.landing-langs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.lang-btn{padding:7px 18px;border-radius:100px;font-size:11.5px;font-weight:600;cursor:pointer;
  border:1px solid var(--border2);background:transparent;color:var(--text2);transition:.15s;font-family:var(--font)}
.lang-btn:hover,.lang-btn.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}

/* ══════════════════════════════════════
   AUTH MODAL
══════════════════════════════════════ */
#auth-modal{position:fixed;inset:0;z-index:4000;display:none;align-items:center;justify-content:center;
  background:rgba(7,9,15,.85);backdrop-filter:blur(8px)}
.auth-box{width:100%;max-width:440px;background:var(--card2);border:1px solid var(--border2);
  border-radius:var(--r-xl);padding:32px;box-shadow:var(--shadow);margin:20px}
.auth-back{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);cursor:pointer;
  margin-bottom:20px;transition:.15s;background:none;border:none;font-family:var(--font)}
.auth-back:hover{color:var(--text)}
.auth-header{margin-bottom:24px}
.auth-header h2{font-size:22px;font-weight:800;letter-spacing:-.4px}
.auth-header p{font-size:12px;color:var(--text2);margin-top:4px}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg2);
  border-radius:var(--r-sm);padding:3px;margin-bottom:22px}
.auth-tab{padding:8px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;
  border:none;background:transparent;color:var(--text3);transition:.2s;font-family:var(--font)}
.auth-tab.active{background:var(--card3);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.4)}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:10px 13px;font-size:13px;color:var(--text);
  font-family:var(--font);outline:none;transition:.15s;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,141,246,.12)}
.field select option{background:var(--card2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.auth-err{background:var(--red-d);border:1px solid rgba(245,90,81,.3);border-radius:var(--r-sm);
  padding:9px 13px;font-size:12px;color:#fca5a5;margin-bottom:12px;display:none}
.btn-submit{width:100%;padding:13px;border-radius:var(--r-sm);border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);
  transition:.2s;margin-top:4px;letter-spacing:.01em}
.btn-submit:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 24px rgba(91,141,246,.4)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-switch{text-align:center;margin-top:14px;font-size:12px;color:var(--text3)}
.auth-switch span{color:var(--accent);cursor:pointer;font-weight:600}

/* ══════════════════════════════════════
   MAIN SHELL
══════════════════════════════════════ */
#shell{display:none;grid-template-columns:220px 1fr;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:18px 14px 12px;border-bottom:1px solid var(--border)}
.sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-brand-icon{width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-brand-name{font-size:15px;font-weight:800;letter-spacing:-.3px}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);
  border-radius:var(--r-sm);border:1px solid var(--border)}
.sb-avatar{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.sb-uinfo{flex:1;min-width:0}
.sb-uname{font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px}
.sb-section{padding:0 8px;margin:12px 0 4px;font-size:8.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;
  cursor:pointer;font-size:12px;color:var(--text2);transition:.15s;
  border:none;background:transparent;width:100%;text-align:left;margin-bottom:2px;font-family:var(--font);font-weight:500}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nav-item.active{background:rgba(91,141,246,.14);color:var(--accent);font-weight:600}
.nav-item .ni-icon{width:16px;height:16px;font-size:14px;text-align:center;flex-shrink:0}
.sb-bottom{padding:12px 14px;border-top:1px solid var(--border)}
.sb-vitals{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.sv-pill{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.sv-val{font-size:15px;font-weight:700;font-family:var(--mono);line-height:1}
.sv-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.sb-lang-wrap{margin-top:6px}
.sb-lang-wrap select{width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:7px;padding:6px 10px;font-size:11px;color:var(--text2);
  font-family:var(--font);outline:none;cursor:pointer}

/* ── MAIN ── */
.main{overflow-y:auto;background:var(--bg);padding:24px;display:flex;flex-direction:column;gap:20px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.page-sub{font-size:12px;color:var(--text2);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.card-title{font-size:13px;font-weight:700;margin-bottom:14px}
.card-sub{font-size:10.5px;color:var(--text3);margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}

/* ── METRIC CARDS ── */
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:18px;position:relative;overflow:hidden}
.metric-accent{position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.metric-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;font-size:15px;margin-bottom:10px}
.metric-val{font-size:28px;font-weight:800;letter-spacing:-1px;font-family:var(--mono);line-height:1}
.metric-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-top:4px}
.metric-sub{font-size:11px;color:var(--text2);margin-top:6px}
.metric-bar{height:2px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
.metric-bar-fill{height:100%;border-radius:2px;transition:width 1s ease}

/* ── FORM FIELDS ── */
.form-field{margin-bottom:14px}
.form-label{display:block;font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.form-input,.form-select{width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:10px 13px;font-size:13px;color:var(--text);
  font-family:var(--font);outline:none;transition:.15s;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,141,246,.1)}
.form-select option{background:var(--card2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── SYMPTOM CHIPS ── */
.symptom-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.sym-chip{padding:6px 13px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--border2);background:var(--bg2);color:var(--text2);transition:.15s}
.sym-chip:hover{border-color:var(--accent);color:var(--accent)}
.sym-chip.sel{border-color:var(--accent);background:rgba(91,141,246,.15);color:var(--accent)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r-sm);
  border:none;font-size:12.5px;font-weight:600;cursor:pointer;transition:.18s;font-family:var(--font)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,141,246,.35)}
.btn-ghost{background:var(--card3);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-danger{background:var(--red-d);color:var(--red);border:1px solid rgba(245,90,81,.25)}
.btn-danger:hover{background:rgba(245,90,81,.2)}
.btn-green{background:var(--green-d);color:var(--green);border:1px solid rgba(16,217,138,.25)}
.btn-green:hover{background:rgba(16,217,138,.2)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-lg{padding:13px 24px;font-size:14px;width:100%;justify-content:center}

/* ── RISK INDICATOR ── */
.risk-ring{position:relative;width:130px;height:130px;margin:0 auto 12px;flex-shrink:0}
.risk-ring svg{transform:rotate(-90deg)}
.risk-ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.risk-score-num{font-size:30px;font-weight:800;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.risk-score-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.risk-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:100px;
  font-size:12px;font-weight:700;letter-spacing:.02em}
.risk-low{background:var(--green-d);color:var(--green);border:1px solid rgba(16,217,138,.3)}
.risk-medium{background:var(--amber-d);color:var(--amber);border:1px solid rgba(247,183,49,.3)}
.risk-high{background:var(--red-d);color:var(--red);border:1px solid rgba(245,90,81,.3)}

/* ── CHART ── */
.chart-wrap{position:relative;height:180px}

/* ── HR DISPLAY ── */
.hr-display{display:flex;align-items:center;gap:16px;padding:16px;
  background:var(--bg2);border-radius:var(--r-sm);border:1px solid var(--border)}
.hr-pulse{width:40px;height:40px;border-radius:50%;background:var(--red-d);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  animation:pulse-ring 1.4s ease infinite;flex-shrink:0}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(245,90,81,.4)}70%{box-shadow:0 0 0 14px rgba(245,90,81,0)}100%{box-shadow:0 0 0 0 rgba(245,90,81,0)}}
.hr-num{font-size:38px;font-weight:800;font-family:var(--mono);letter-spacing:-2px;line-height:1}
.hr-unit{font-size:12px;color:var(--text3);margin-top:4px}
.hr-status{font-size:10px;color:var(--text2)}

/* ── RECS ── */
.rec-item{display:flex;align-items:flex-start;gap:10px;padding:10px;
  background:var(--bg2);border-radius:var(--r-sm);border-left:3px solid var(--accent);margin-bottom:7px}
.rec-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.rec-text{font-size:12px;color:var(--text2);line-height:1.5}

/* ── DOCTOR CARD ── */
.doc-card{display:flex;align-items:center;gap:13px;padding:13px;
  background:var(--bg2);border-radius:var(--r-sm);border:1px solid var(--border);
  transition:.15s;margin-bottom:8px}
.doc-card:hover{border-color:var(--border2)}
.doc-avatar{width:40px;height:40px;border-radius:11px;background:var(--green-d);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-spec{font-size:10.5px;color:var(--text2);margin-top:1px}
.doc-hosp{font-size:10px;color:var(--text3);margin-top:1px}
.doc-actions{display:flex;gap:6px;flex-shrink:0}

/* ── HISTORY ── */
.hist-item{display:flex;align-items:center;gap:12px;padding:11px 13px;
  background:var(--bg2);border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:.15s}
.hist-item:hover{border-color:var(--border2)}
.hist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hist-info{flex:1}
.hist-date{font-size:10px;color:var(--text3)}
.hist-score{font-size:22px;font-weight:800;font-family:var(--mono);letter-spacing:-1px}

/* ── SENSOR STATUS ── */
.sensor-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);display:inline-block;margin-right:5px}
.sensor-dot.live{background:var(--green);animation:blink 1.2s ease infinite}
.sensor-dot.error{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card3);border:1px solid var(--border2);border-radius:var(--r);
  padding:11px 20px;font-size:13px;font-weight:600;z-index:9999;
  box-shadow:var(--shadow);opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING SPINNER ── */
.spin{width:20px;height:20px;border:2px solid rgba(255,255,255,.15);
  border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DOCTOR DASHBOARD ── */
.doc-reg-form{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px}
.doc-reg-form h3{font-size:16px;font-weight:800;margin-bottom:18px;letter-spacing:-.3px}
.registered-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;
  border-radius:100px;background:var(--green-d);color:var(--green);font-size:11px;font-weight:700;
  border:1px solid rgba(16,217,138,.3);margin-bottom:16px}

/* ── ALERT BANNER ── */
.alert-banner{display:flex;align-items:center;gap:12px;padding:13px 18px;
  border-radius:var(--r-sm);margin-bottom:14px}
.alert-high{background:var(--red-d);border:1px solid rgba(245,90,81,.3);color:var(--red)}
.alert-sms{background:var(--green-d);border:1px solid rgba(16,217,138,.3);color:var(--green)}

/* ── PAGE ANIMATION ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .3s ease}

/* ── GRID LINE BG ── */
#landing::after{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(91,141,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(91,141,246,.04) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;z-index:-1}
</style>
</head>
<body>

<!-- ══ LANDING ══ -->
<div id="landing">
  <div class="landing-inner anim">
    <div class="vitacore-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>

function t(k){ return (TRANSLATIONS[state.lang]||TRANSLATIONS.en)[k] || k; }

function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA') el.placeholder = t(k);
    else el.textContent = t(k);
  });
  // Landing
  const map = {
    'l-appName':'appName','l-tagline':'tagline','l-selectRole':'selectRole',
    'l-patient':'patient','l-doctor':'doctor','l-patientDesc':'patientDesc','l-doctorDesc':'doctorDesc'
  };
  Object.entries(map).forEach(([id,key])=>{ const el=document.getElementById(id); if(el) el.textContent=t(key); });
}

function setLang(lang, btn){
  state.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const sel = document.getElementById('sb-lang-sel');
  if(sel) sel.value = lang;
  applyTranslations();
  if(state.token) renderCurrentPage();
}
function changeLang(lang){
  state.lang = lang;
  applyTranslations();
  if(state.token) renderCurrentPage();
}

// ══════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════
async function api(path, method='GET', body=null){
  try{
    const opts={method,headers:{'Content-Type':'application/json'}};
    if(state.token) opts.headers['X-Auth-Token']=state.token;
    if(body) opts.body=JSON.stringify(body);
    const r=await fetch(API+path,opts);
    return await r.json();
  }catch(e){
    // Backend offline: return mock data
    return null;
  }
}

let currentPage = 'dashboard';

function showLanding(){
  document.getElementById('landing').style.display='flex';
  document.getElementById('auth-modal').style.display='none';
  document.getElementById('auth-box').style.display='none';
}

function chooseRole(role){
  state.role = role;
  document.getElementById('landing').style.display='none';
  document.getElementById('auth-modal').style.display='flex';
  document.getElementById('auth-box').style.display='block';
  document.getElementById('auth-title').textContent = role==='patient'?t('patient'):t('doctor');
  document.getElementById('auth-subtitle').textContent = role==='patient'?t('patientDesc'):t('doctorDesc');
  document.getElementById('doc-extra-fields').style.display = role==='doctor'?'block':'none';
}

function switchAuthTab(tab){
  state.authTab = tab;
  document.getElementById('form-login').style.display  = tab==='login'?'block':'none';
  document.getElementById('form-register').style.display = tab==='register'?'block':'none';
  document.getElementById('tab-login').className   = 'auth-tab'+(tab==='login'?' active':'');
  document.getElementById('tab-register').className = 'auth-tab'+(tab==='register'?' active':'');
  document.getElementById('auth-err').style.display='none';
}

function showAuthError(msg){
  const el=document.getElementById('auth-err');
  el.textContent=msg; el.style.display='block';
}

async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  if(!u||!p){showAuthError('Please fill all fields');return;}
  const btn=document.getElementById('btn-login');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  const res=await api('/auth/login','POST',{username:u,password:p});
  btn.disabled=false; btn.textContent=t('login');
  if(!res||res.error){
    // Demo mode: mock login
    enterApp({token:'demo_token',patient_id:'P_DEMO',full_name:u,role:state.role||'patient',profile:{},language:state.lang});
    return;
  }
  enterApp(res);
}

async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const uname=document.getElementById('reg-user').value.trim();
  const pw=document.getElementById('reg-pass').value;
  if(!name||!uname||!pw){showAuthError('Please fill all fields');return;}
  const btn=document.getElementById('btn-register');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  const payload={full_name:name,username:uname,password:pw,
    age:+document.getElementById('reg-age').value,
    gender:document.getElementById('reg-gender').value,
    phone:document.getElementById('reg-phone').value,
    language:state.lang,role:state.role||'patient'};
  if(state.role==='doctor'){
    payload.doctor_info={
      hospital:document.getElementById('reg-hospital').value,
      specialization:document.getElementById('reg-spec').value,
      experience_years:+document.getElementById('reg-exp').value
    };
  }
  const res=await api('/auth/register','POST',payload);
  btn.disabled=false; btn.textContent=t('register');
  if(!res||res.error){
    // Backend offline: demo mode — allow registration locally
    if(!res){
      enterApp({token:'demo_token',patient_id:'P_'+Date.now(),full_name:payload.full_name,role:state.role||'patient',profile:payload,language:state.lang});
      return;
    }
    showAuthError(res?.error||'Registration failed');return;
  }
  enterApp(res);
}

function enterApp(data){
  state.token=data.token; state.patient_id=data.patient_id;
  state.full_name=data.full_name; state.profile=data.profile||{};
  if(data.role) state.role=data.role;
  if(data.language) state.lang=data.language;
  document.getElementById('auth-modal').style.display='none';
  document.getElementById('landing').style.display='none';
  document.getElementById('shell').style.display='grid';
  document.getElementById('sb-uname').textContent=state.full_name;
  document.getElementById('sb-urole').textContent=state.role==='doctor'?t('doctor'):t('patient');
  document.getElementById('sb-avatar').textContent=state.role==='doctor'?'👨‍⚕️':'🧑';
  renderNav();
  startSensorBackground();
  navigate('dashboard');
}

function doLogout(){
  api('/auth/logout','POST');
  state.token=null; state.patient_id=null; state.lastResult=null;
  clearInterval(state.sensorInterval); state.sensorInterval=null;
  document.getElementById('shell').style.display='none';
  document.getElementById('landing').style.display='flex';
  showToast('Logged out. See you! 👋');
}

function startSensorBackground(){
  // Simulate slow background drift
  setInterval(()=>{
    if(!state.sensorRunning){
      const drift = (Math.random()-.5)*2;
      state.heartRate = Math.max(50,Math.min(110,Math.round(state.heartRate+drift)));
      updateSidebarVitals();
    }
  },3000);
}
setInterval(() => {
  fetch("http://192.168.31.55:5000/iot/heartrate/latest")
    .then(res => res.json())
    .then(data => {
      console.log(data.heart_rate);
      updateGraph(data.heart_rate);
    });
}, 2000);

function startMockSensor(){
  if(state.sensorRunning) return;
  state.sensorRunning=true;
  state.sensorInterval=setInterval(async()=>{
    const t_val = Date.now()/1000;
    const wave = Math.sin(t_val/40)*8;
    const noise = (Math.random()-.5)*4;
    const spike = Math.random()<0.03?20:0;
    const bpm = Math.max(48,Math.min(155,Math.round(72+wave+noise+spike)));
    state.heartRate=bpm;
    state.hrHistory.push(bpm);
    if(state.hrHistory.length>60) state.hrHistory.shift();
    updateHRDisplay(bpm);
    updateSidebarVitals();
    // Also post to backend
    await api('/iot/heartrate','POST',{patient_id:state.patient_id,heart_rate:bpm});
  },1500);
  document.getElementById('sensor-btn')?.innerHTML && updateSensorBtn();
  showToast('🫀 Mock sensor started');
}

function stopMockSensor(){
  clearInterval(state.sensorInterval);
  state.sensorInterval=null; state.sensorRunning=false;
  updateSensorBtn();
  showToast('Sensor stopped');
}

function updateSensorBtn(){
  const btn=document.getElementById('sensor-btn');
  if(!btn) return;
  if(state.sensorRunning){
    btn.textContent=t('stopSensor');
    btn.className='btn btn-danger';
    btn.onclick=stopMockSensor;
  } else {
    btn.textContent=t('startSensor');
    btn.className='btn btn-green';
    btn.onclick=startMockSensor;
  }
}

function updateHRDisplay(bpm){
  const el=document.getElementById('live-hr-num');

  const dot=document.getElementById('sensor-dot');
  if(dot){ dot.className='sensor-dot '+(state.sensorRunning?'live':''); }

}

// Chart
let hrChart=null;
function initHRChart(){
  const canvas=document.getElementById('hr-chart');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  if(hrChart){ hrChart.destroy(); hrChart=null; }
  const labels=Array.from({length:30},(_,i)=>i===29?'now':`-${29-i}s`);
  const data=Array(30).fill(72);
  hrChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      label:'BPM',data,borderColor:'#f55a51',borderWidth:2,
      backgroundColor:'rgba(245,90,81,.08)',tension:.4,fill:true,
      pointRadius:0,pointHoverRadius:4,
    }]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},
      scales:{
        x:{ticks:{color:'#3b4570',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},
        y:{min:40,max:160,ticks:{color:'#3b4570',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}}
      },
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,
        callbacks:{label:ctx=>`${ctx.parsed.y} BPM`}}}
    }
  });
}

function updateHRChart(bpm){
  if(!hrChart) return;
  const ds=hrChart.data.datasets[0];
  ds.data.shift(); ds.data.push(bpm);
  hrChart.update('none');
}

// Poll backend for real ESP32 data
async function pollESP32(){
  const res=await api(`/iot/heartrate/${state.patient_id}`);
  if(res?.heart_rate && !state.sensorRunning){
    state.heartRate=res.heart_rate;
    state.hrHistory.push(res.heart_rate);
    if(state.hrHistory.length>60) state.hrHistory.shift();
    updateHRDisplay(res.heart_rate);
    updateHRChart(res.heart_rate);
    checkHeartRate(res.heart_rate); // ✅ ADD THIS LINE HERE
  }
}

const selectedSymptoms=new Set();
function toggleSym(id){
  if(selectedSymptoms.has(id)){selectedSymptoms.delete(id);document.getElementById('sym-'+id).classList.remove('sel');}
  else{selectedSymptoms.add(id);document.getElementById('sym-'+id).classList.add('sel');}
}

function symptomsToAPI(){
  const map={chestPain:'chest_pain',breathShort:'shortness_of_breath'};
  return [...selectedSymptoms].map(s=>map[s]||s);
}

async function doAnalyze(){
  const btn=document.getElementById('analyze-btn');
  btn.disabled=true; btn.innerHTML=`<span class="spin"></span> ${t('analyzing')}`;
  const payload={
    patient_id:state.patient_id, age:+document.getElementById('f-age').value,
    gender:document.getElementById('f-gender').value,
    height_cm:+document.getElementById('f-height').value,
    weight_kg:+document.getElementById('f-weight').value,
    sleep_hours:+document.getElementById('f-sleep').value,
    heart_rate:+document.getElementById('f-hr').value,
    systolic_bp:+document.getElementById('f-sbp').value,
    diastolic_bp:+document.getElementById('f-dbp').value,
    daily_steps:+document.getElementById('f-steps').value,
    stress_level:+document.getElementById('f-stress').value,
    exercise_freq:document.getElementById('f-ex').value,
    diet_quality:document.getElementById('f-diet').value,
    smoker:document.getElementById('f-smoke').value,
    alcohol:document.getElementById('f-alc').value,
    temperature:+document.getElementById('f-temp').value,
    symptoms:symptomsToAPI(),
  };

  let res=await api('/analyze','POST',payload);
  if(!res){
    // Demo: compute locally
    res=computeLocalRisk(payload);
  }

  state.lastResult=res;
  state.analysisHistory.push({
    ts:new Date().toISOString(), score:res.score, level:res.risk_level,
    hr:payload.heart_rate, bmi:res.bmi
  });
  updateSidebarVitals();

  if(res.risk_level==='High') showToast('🚨 '+t('highRiskAlert'),4000);
  else if(res.risk_level==='Medium') showToast('⚠️ Medium risk detected',3000);
  else showToast('✅ Analysis complete',2000);

  navigate('results');
}



function computeLocalRisk(d){
  const bmi=d.weight_kg/((d.height_cm/100)**2);
  let lr=15;
  if(bmi>30)lr+=18;else if(bmi>25)lr+=10;else if(bmi<18.5)lr+=6;
  if(d.smoker==='Yes')lr+=22;
  if(d.alcohol==='Moderate')lr+=10;else if(d.alcohol==='High')lr+=18;
  lr+=Math.max(0,(d.stress_level-5)*3);
  if(d.sleep_hours<6)lr+=14;else if(d.sleep_hours<7)lr+=7;
  const exm={Daily:0,'3-5 times/week':5,'1-2 times/week':12,None:20};
  lr+=exm[d.exercise_freq]||0;
  const dm={Excellent:0,Good:5,Average:12,Poor:20};
  lr+=dm[d.diet_quality]||0;
  if(d.heart_rate>100)lr+=8;
  if(d.systolic_bp>140)lr+=15;else if(d.systolic_bp>130)lr+=8;
  const danger=['chest_pain','shortness_of_breath'];
  lr+=d.symptoms.filter(s=>danger.includes(s)).length*15;
  lr+=d.symptoms.filter(s=>!danger.includes(s)).length*5;
  if(d.temperature>103)lr+=12;else if(d.temperature>101)lr+=7;
  lr=Math.min(98,Math.max(5,lr));
  let sr=10;
  if(d.sleep_hours<5)sr+=40;else if(d.sleep_hours<6)sr+=28;else if(d.sleep_hours<7)sr+=14;
  if(d.stress_level>7)sr+=18;else if(d.stress_level>5)sr+=8;
  sr=Math.min(98,Math.max(5,sr));
  let bio=d.age; if(bmi>30)bio+=4;else if(bmi>25)bio+=2;
  if(d.smoker==='Yes')bio+=5; if(d.exercise_freq==='Daily')bio-=3;
  const score=Math.max(5,Math.min(98,Math.round(100-(lr*.55+sr*.30+Math.abs(bio-d.age)*.5))));
  const level=score>=70?'Low':score>=45?'Medium':'High';
  const recs=[];
  if(lr>50)recs.push({icon:'🏃',text:'Increase physical activity to at least 30 min/day'});
  if(d.sleep_hours<7)recs.push({icon:'😴',text:'Aim for 7–9 hours of quality sleep'});
  if(d.stress_level>6)recs.push({icon:'🧘',text:'Practice mindfulness or breathing exercises daily'});
  if(bmi>25)recs.push({icon:'🥗',text:'Follow a balanced diet to reach healthy BMI'});
  if(d.smoker==='Yes')recs.push({icon:'🚭',text:'Smoking significantly raises cardiovascular risk'});
  if(d.heart_rate>100)recs.push({icon:'❤️',text:'Elevated resting heart rate — consult a cardiologist'});
  if(d.temperature>101)recs.push({icon:'🌡️',text:'Fever detected — rest, hydrate, and see a doctor if persistent'});
  if(recs.length===0)recs.push({icon:'✅',text:'Keep up the great work! Schedule regular checkups.'});
  const docs=level==='High'?[
    {name:'Dr. Priya Sharma',hospital:'Apollo Hospitals',specialization:'Cardiology',phone:'+918042124444',doctor_id:'D1'},
    {name:'Dr. Rajesh Kumar',hospital:'Manipal Hospital',specialization:'General Medicine',phone:'+918022344444',doctor_id:'D2'},
  ]:[];
  return {score,risk_level:level,bmi:Math.round(bmi*10)/10,bio_age:Math.round(bio),lifestyle_risk:lr,sleep_risk:sr,recommendations:recs,matched_doctors:docs,sms_sent:false,vitals_summary:{heart_rate:d.heart_rate,systolic_bp:d.systolic_bp,diastolic_bp:d.diastolic_bp,temperature:d.temperature}};
}
